<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="auto.css">
</head>
<body>
    <span id="gear">&#9881</span>
    <span id="clock">&bull; online | &#128337 - ms</span>
    <div class="content">
    <h1><span id="firsth">Being</span><span id="lasth">Infinity</span></h1>
    <p id="p1">One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>
    <span>
        <span class="lens">&#128269;</span>
        <input class="search-bar" id="search-bar" type="text" placeholder="Start typing to search phrases..."></span>
    </div>

    <div id="suggestion-box">
        <!-- <p>Suggestion Box</p> -->
    </div>

    <script>
        var searchBox = document.getElementById("search-bar");
        var suggestionBox = document.getElementById("suggestion-box");
        searchBox.addEventListener("input", function() {
            // 1. Get user typed text
            var userInput = searchBox.value;
            if(userInput.trim() === "") {

            }
            else {
                var url1 = "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
                var url3 = "&algorithm=brute&limit=10&weighted=false";

                var url = url1 + userInput + url3;
            }
            // 2. Make API call to get suggestions
            fetch(url)
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                console.log(data);
                var resultArray = data.results;
                var htmlResults = "";

                for(var i = 0; i < resultArray.length; i++) {
                    htmlResults += "<div id='results'>" + resultArray[i].text + "</div>";
                }

                suggestionBox.innerHTML = htmlResults;
            })
            // 3. Display results in HTML
        })
    </script>
</body>
</html>
